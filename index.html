<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Orbital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0,255,255,0.3);
            backdrop-filter: blur(5px);
            z-index: 100;
            user-select: none;
            width: 220px;
        }

        .controls h2 {
            margin-bottom: 12px;
            font-size: 16px;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: block;
            font-size: 10px;
            color: #ff0;
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #0ff;
        }

        .value-display {
            float: right;
            color: #fff;
            font-weight: bold;
            font-size: 11px;
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(0,255,255,0.1);
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0,255,0,0.3);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            text-align: center;
            max-width: 500px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🪐 NEON ORBITAL</h2>

        <div class="control-group">
            <label>Gravity (G) <span class="value-display" id="gVal">0.5</span></label>
            <input type="range" id="gravity" min="0.1" max="2" step="0.1" value="0.5">
        </div>

        <div class="control-group">
            <label>Trail Length <span class="value-display" id="trailVal">100</span></label>
            <input type="range" id="trail" min="20" max="300" value="100">
        </div>

        <div class="control-group">
            <label>Min Mass <span class="value-display" id="minMassVal">5</span></label>
            <input type="range" id="minMass" min="1" max="20" value="5">
        </div>

        <div class="control-group">
            <label>Max Mass <span class="value-display" id="maxMassVal">30</span></label>
            <input type="range" id="maxMass" min="10" max="100" value="30">
        </div>

        <div class="control-group">
            <label>Initial Planets <span class="value-display" id="initCountVal">5</span></label>
            <input type="range" id="initCount" min="2" max="15" value="5">
        </div>

        <div class="buttons">
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="buttons">
            <button id="randomBtn">Random System</button>
        </div>
    </div>

    <div class="stats">
        <div>Planets: <span id="planetCount">0</span></div>
        <div>FPS: <span id="fps">60</span></div>
    </div>

    <div class="instructions">
        Click to add a planet • Right-click to delete • Watch gravity pull them into orbits, collisions, or chaos • Adjust parameters and reset
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Controls
        const gravitySlider = document.getElementById('gravity');
        const trailSlider = document.getElementById('trail');
        const minMassSlider = document.getElementById('minMass');
        const maxMassSlider = document.getElementById('maxMass');
        const initCountSlider = document.getElementById('initCount');

        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const randomBtn = document.getElementById('randomBtn');

        let width, height;
        let planets = [];
        let G = 0.5;
        let paused = false;
        let lastTime = 0;
        let frameCount = 0;
        let lastFpsTime = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Planet {
            constructor(x, y, vx, vy, mass, hue) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.mass = mass;
                this.hue = hue;
                this.radius = Math.sqrt(mass) * 1.5; // size proportional to sqrt(mass)
                this.trail = [];
                this.maxTrail = parseInt(trailSlider.value);
            }

            updateTrail() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
            }

            drawTrail(ctx) {
                if (this.trail.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(this.trail[0].x, this.trail[0].y);
                for (let i = 1; i < this.trail.length; i++) {
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                // Gradient alpha along trail
                const gradient = ctx.createLinearGradient(
                    this.trail[0].x, this.trail[0].y,
                    this.trail[this.trail.length-1].x, this.trail[this.trail.length-1].y
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, 0)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 60%, 0.8)`);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.radius * 0.8;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            draw(ctx) {
                // Draw trail first
                this.drawTrail(ctx);

                // Draw body
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function initRandomSystem() {
            planets = [];
            const count = parseInt(initCountSlider.value);
            const minM = parseInt(minMassSlider.value);
            const maxM = parseInt(maxMassSlider.value);
            for (let i = 0; i < count; i++) {
                const mass = minM + Math.random() * (maxM - minM);
                const x = Math.random() * (width - 200) + 100;
                const y = Math.random() * (height - 200) + 100;
                // Give it a velocity roughly tangential for orbit-like motion
                const cx = width/2, cy = height/2;
                const dx = x - cx;
                const dy = y - cy;
                const dist = Math.sqrt(dx*dx + dy*dy) + 1;
                // tangential: perpendicular to radial
                const speed = Math.sqrt(G * 1000 / dist) * (0.5 + Math.random()); // crude orbital speed estimate
                const vx = -dy / dist * speed;
                const vy = dx / dist * speed;
                const hue = Math.random() * 360;
                planets.push(new Planet(x, y, vx, vy, mass, hue));
            }
        }

        function update() {
            if (paused) return;

            // Update trails first (before positions change)
            planets.forEach(p => p.updateTrail());

            const n = planets.length;
            // Compute forces pairwise
            for (let i = 0; i < n; i++) {
                let fx = 0, fy = 0;
                const pi = planets[i];
                for (let j = 0; j < n; j++) {
                    if (i === j) continue;
                    const pj = planets[j];
                    const dx = pj.x - pi.x;
                    const dy = pj.y - pi.y;
                    let distSq = dx*dx + dy*dy;
                    if (distSq < 4) distSq = 4; // softening/clamp to avoid extreme forces
                    const dist = Math.sqrt(distSq);
                    const force = G * pi.mass * pj.mass / distSq;
                    fx += force * dx / dist;
                    fy += force * dy / dist;
                }
                // Apply acceleration (F = ma => a = F/m)
                pi.vx += fx / pi.mass;
                pi.vy += fy / pi.mass;
            }

            // Update positions
            planets.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                // Simple boundary: wrap around?
                // Let's do bounce off edges with damping
                const margin = 50;
                if (p.x < margin) { p.x = margin; p.vx *= -0.8; }
                if (p.x > width - margin) { p.x = width - margin; p.vx *= -0.8; }
                if (p.y < margin) { p.y = margin; p.vy *= -0.8; }
                if (p.y > height - margin) { p.y = height - margin; p.vy *= -0.8; }
            });

            // Optional: simple collision merge if close? Might be fun:
            // for now, just pass through. But we could merge for dramatic effect.
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // fade for all trails
            ctx.fillRect(0, 0, width, height);

            planets.forEach(p => p.draw(ctx));

            // Draw stats
            document.getElementById('planetCount').textContent = planets.length;
        }

        function animate(timestamp) {
            const delta = timestamp - lastTime || 16;
            lastTime = timestamp;

            frameCount++;
            if (timestamp - lastFpsTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsTime = timestamp;
            }

            update();
            draw();

            requestAnimationFrame(animate);
        }

        // UI
        function updateDisplays() {
            document.getElementById('gVal').textContent = gravitySlider.value;
            document.getElementById('trailVal').textContent = trailSlider.value;
            document.getElementById('minMassVal').textContent = minMassSlider.value;
            document.getElementById('maxMassVal').textContent = maxMassSlider.value;
            document.getElementById('initCountVal').textContent = initCountSlider.value;
        }

        [gravitySlider, trailSlider, minMassSlider, maxMassSlider, initCountSlider].forEach(s => {
            s.addEventListener('input', updateDisplays);
            // Also update values on change? For trail length we need to update existing planets
        });

        trailSlider.addEventListener('change', () => {
            const newMax = parseInt(trailSlider.value);
            planets.forEach(p => p.maxTrail = newMax);
        });

        pauseBtn.addEventListener('click', () => {
            paused = !paused;
            pauseBtn.textContent = paused ? 'Resume' : 'Pause';
        });

        resetBtn.addEventListener('click', () => {
            planets = [];
        });

        randomBtn.addEventListener('click', () => {
            initRandomSystem();
        });

        // Click to add planet
        canvas.addEventListener('mousedown', (e) => {
            const x = e.clientX, y = e.clientY;
            if (e.button === 2) {
                // Right-click: delete nearest planet
                for (let i = planets.length - 1; i >= 0; i--) {
                    const p = planets[i];
                    const dx = p.x - x;
                    const dy = p.y - y;
                    if (dx*dx + dy*dy < p.radius*p.radius + 25) {
                        planets.splice(i, 1);
                        return;
                    }
                }
                return;
            }
            // Left click: add planet with initial velocity determined by mouse movement? Hard to get drag.
            // Simpler: give it a small random velocity tangential-ish from center
            const minM = parseInt(minMassSlider.value);
            const maxM = parseInt(maxMassSlider.value);
            const mass = minM + Math.random() * (maxM - minM);
            const cx = width/2, cy = height/2;
            const dx = x - cx;
            const dy = y - cy;
            const dist = Math.sqrt(dx*dx + dy*dy) + 1;
            // tangential velocity magnitude proportional to 1/sqrt(dist) for roughly circular orbit
            const speed = Math.sqrt(G * 1000 / dist) * (0.7 + Math.random()*0.6);
            const vx = -dy / dist * speed;
            const vy = dx / dist * speed;
            const hue = Math.random() * 360;
            planets.push(new Planet(x, y, vx, vy, mass, hue));
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // Initialize
        initRandomSystem();
        updateDisplays();
        animate(0);
    </script>
</body>
</html>
